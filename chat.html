<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with ASH</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #050505; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: 'Outfit', sans-serif; }
    .chat-header { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .chat-header h2 { margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
    .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .chat-msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
    .chat-msg.admin { background: rgba(255,0,128,0.1); border: 1px solid var(--primary); align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-msg.user { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-author { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; opacity: 0.7; }
    .chat-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); background: #09090b; display: flex; gap: 10px; }
    .chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px 15px; color: #fff; outline: none; transition: 0.3s; }
    .chat-input:focus { border-color: var(--primary); }
    .chat-btn { background: var(--primary); color: #fff; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .chat-btn:hover { background: #ff3399; }
  </style>
</head>
<body>
  <div class="chat-header">
    <h2><i data-lucide="message-square"></i> Order Chat</h2>
    <div style="font-size: 0.85rem; color: #a1a1aa; display: flex; align-items: center; gap: 8px;">
        <span id="user-display">Loading...</span>
        <div style="width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00;"></div>
    </div>
  </div>

  <div class="chat-body" id="chat-messages">
    <div style="text-align:center; color: #a1a1aa; margin-top: 20px; font-size: 0.9rem;">Connecting to secure chat...</div>
  </div>

  <div class="chat-footer">
    <input type="text" id="chat-input-text" class="chat-input" placeholder="Type a message to ASH...">
    <button id="chat-send-btn" class="chat-btn"><i data-lucide="send" style="width: 18px; height: 18px;"></i></button>
  </div>

  <script type="module">
    import { listenToUserChat, sendChatMessage, isDbActive } from './db.js';
    lucide.createIcons();

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('uid');
    const username = params.get('uname') || 'Customer';

    if (!userId) {
        document.getElementById('chat-messages').innerHTML = '<div style="text-align:center; color: #ff3333; margin-top: 50px;">Error: User ID missing. Please start request from the main website.</div>';
    } else {
        document.getElementById('user-display').textContent = username;
        
        listenToUserChat(userId, (messages) => {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align:center; color: #a1a1aa; margin-top: 20px; font-size: 0.9rem;">Chat history will be saved here securely. Say hello!</div>';
            }

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `chat-msg ${msg.isAdmin ? 'admin' : 'user'}`;
                div.innerHTML = `
                    <div class="msg-author">${msg.isAdmin ? 'ASH (Artist)' : msg.username}</div>
                    ${msg.text}
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });

        const sendBtn = document.getElementById('chat-send-btn');
        const inputField = document.getElementById('chat-input-text');

        async function sendMsg() {
            const text = inputField.value.trim();
            if (text) {
                inputField.value = '';
                await sendChatMessage(userId, username, text, false);
                
                // Also trigger Discord Webhook so admin gets a phone notification
                fetch('https://discord.com/api/webhooks/1497176661089849505/TQhpStDViMkl20szKdJrqeG9ixPvu7TIv60UF_OYocUGNB1Y_Us2-9FHhV_ZS5dLlnSk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**[CHAT]** (User: ${username}) ${text}\n*<#1497990868001357825>*`,
                        username: "ASH Commission Bot",
                        avatar_url: "https://i.postimg.cc/g2dq6KZH/panel-699650139-image-a9cc0c41-1603-4d8c-8856-36dc086fbef6.png"
                    })
                }).catch(e => console.error("Webhook failed", e));
            }
        }

        sendBtn.addEventListener('click', sendMsg);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
    }
  </script>
</body>
</html>
